name: Baseline

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  URNERYS: app.urnerys.dev
  BUILD: "github-run-${{ github.run_id }}-${{ github.run_attempt }}"
  BISCUIT_PRIVATE_KEY: ed25519-private/869fb6eef6b04ee212479b344690549c9e77bde6c3412b5badcd8b65f89d8c70

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - run: |
          OIDC_TOKEN=$(curl -sf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$URNERYS" | jq -r '.value')
          URNERYS_TOKEN=$(curl -sf -X POST -H "Content-Type: application/x-www-form-urlencoded" --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" --data-urlencode "subject_token=$OIDC_TOKEN" --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token" "https://$URNERYS/api/v1/token" | jq -r '.access_token')
          echo "URNERYS_TOKEN=$URNERYS_TOKEN" >> $GITHUB_ENV

      - run: |
          curl -sf -X POST -H "Authorization: Bearer $URNERYS_TOKEN" -H "Content-Type: application/json" -d '{ "id": "'"$BUILD"'", "build": { "origin": { "commit": "${{ github.sha }}" } } }' "https://$URNERYS/api/v1/projects/webshot/builds"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix run .#nix-develop .#workflow

      - run: cargo test --locked --all-features --all-targets

      - run: |
          curl -sf -X PATCH -H "Authorization: Bearer $URNERYS_TOKEN" -H "Content-Type: application/json" -d '{ "baseline": { "build": "'"$BUILD"'" } }' "https://$URNERYS/api/v1/projects/webshot/baselines/production"
